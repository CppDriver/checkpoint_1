<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>checkpoint_1</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../styles/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-OERcA2EqjJCMA+/3y+gxIOqMEjwtxJY7qPCqsdltbNJuaOe923+mo//f6V8Qbsw3" crossorigin="anonymous"></script>
</head>
<body>
    <div class="jumbotron d-flex align-items-center min-vh-100">
        <div class="container rounded-4" id="loginContainer">
            <ul class="nav nav-tabs nav-justified rounded-top" role="tablist">
                <li class="nav-item">
                    <a class="nav-link active" data-bs-toggle="tab" href="#login">Login</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-bs-toggle="tab" href="#regist">Register</a>
                </li>
            </ul>
            <div class="tab-content">
                <div id="login" class="container tab-pane active form-floating mb-3 mt-3">
<!--                    <p>Login form will be displayed here.</p>-->
                    <form>
                        <div class="div_form">
                            <label class="loglabel whitetext" for="nick">username:</label>
                            <input id="nick" class="form-control" placeholder="enter username">
                        </div>
                        <div class="div_form">
                            <label class="loglabel whitetext">password:</label>
                            <input type="password" class="form-control" placeholder="enter password">
                            <a role="button" class="btn loginButton centeredButton whitetext mt32 mb16">Log in</a>
                        </div>
                    </form>
                </div>
                <div id="regist" class="container tab-pane">
<!--                    <p>Registration form will be displayed here.</p>-->
                    <form>
                        <div class="div_form">
                            <div class="row">
                                <div class="col col-min-width-128">
                                    <label class="loglabel whitetext">name:</label>
                                    <input class="form-control" placeholder="first name">
                                </div>
                                <div class="col col-min-width-128">
                                    <label class="loglabel whitetext">surname:</label>
                                    <input class="form-control" placeholder="surname">
                                </div>
                            </div>
                        </div>
                        <div class="div_form">
                            <label class="loglabel whitetext" for="email">e-mail:</label>
                            <input id="email" class="form-control" placeholder="enter your e-mail">
                        </div>
                        <div class="div_form">
                            <label class="loglabel whitetext">username:</label>
                            <input class="form-control" placeholder="choose your username">
                        </div>
                        <div class="div_form">
                            <label class="loglabel whitetext">password:</label>
                            <input type="password" class="form-control" placeholder="choose your password">
                        </div>
                        <div class="div_form">
                            <label class="loglabel whitetext">repeat password:</label>
                            <input type="password" class="form-control" placeholder="write password again">
                            <a role="button" class="btn registerButton centeredButton whitetext mt32 mb16">Create an account</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
